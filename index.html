<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Comic Maker</title>
<style>
body { font-family: Arial, sans-serif; background:#f0f4f8; text-align:center; margin:0; }
header { background:#4CAF50; color:white; padding:15px; }
#toolbar { margin:20px 0; display:flex; flex-wrap:wrap; justify-content:center; gap:10px; }
#comic-container { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-top:20px; }
.panel { width:300px; height:300px; border:2px solid #333; position:relative; cursor:pointer; overflow:hidden; background:white; }
.panel.selected { border:4px solid #FF5722; }
.panel-bg { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; background-size:cover; background-position:center; }
.panel-content { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }

.speech-wrapper, .image-wrapper { position:absolute; display:inline-block; }
.speech-wrapper:hover, .image-wrapper:hover { outline:3px solid orange; }

.speech { 
    background:yellow; padding:5px; border-radius:10px; max-width:280px; 
    cursor:text; pointer-events:auto; position:relative; z-index:2000;
}

.resizer {
    width:20px; height:20px; background: rgba(76, 175, 80, 0.7);
    border:2px solid #000; border-radius:50%; position:absolute; z-index:1000; pointer-events: all;
}
.resizer.tl { top:-10px; left:-10px; cursor:nwse-resize; }
.resizer.tr { top:-10px; right:-10px; cursor:nesw-resize; }
.resizer.bl { bottom:-10px; left:-10px; cursor:nesw-resize; }
.resizer.br { bottom:-10px; right:-10px; cursor:nwse-resize; }

.rotator {
    width:20px; height:20px; background: rgba(255, 87, 34, 0.7);
    border:2px solid #000; border-radius:50%; position:absolute; right:-10px; top:-10px;
    cursor:grab; z-index:1000; pointer-events: all;
}

input[type=file] { margin-top:5px; }
#selected-panel { font-weight:bold; margin-left:10px; }
button { cursor:pointer; padding:5px 10px; margin:2px; }
</style>
</head>
<body>

<header><h1>Mini Comic / Book Maker</h1></header>

<div id="toolbar">
  <button onclick="addPanel()">Add Panel</button>
  <button onclick="addSpeech()">Add Speech Bubble</button>
  <button onclick="clearPanels()">Clear All Panels</button>
  <button onclick="downloadPanels()">Download All Panels</button>
  <button onclick="unlockTTS()">Unlock TTS</button>
  <button onclick="playComicTTS()">Play Comic (TTS)</button>
  <div><label>Selected Panel: <span id="selected-panel">None</span></label></div>
  <div>
    <label>Upload Image for Selected Panel:</label>
    <input type="file" id="uploadImage" accept="image/*">
  </div>
  <div>
    <label>Upload Background for Selected Panel:</label>
    <input type="file" id="uploadBg" accept="image/*">
  </div>
</div>

<div id="comic-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
let panelCount=0;
let selectedPanel=null;
let ttsUnlocked=false;

// PANEL FUNCTIONS
function addPanel(){
    const container=document.getElementById('comic-container');
    const panel=document.createElement('div');
    panel.className='panel';
    panel.id='panel-'+panelCount;

    const bgDiv=document.createElement('div');
    bgDiv.className='panel-bg';
    panel.appendChild(bgDiv);

    const contentDiv=document.createElement('div');
    contentDiv.className='panel-content';
    panel.appendChild(contentDiv);

    panel.addEventListener('click', e=>{
        e.stopPropagation();
        selectPanel(panel);
    });

    container.appendChild(panel);
    selectPanel(panel);
    panelCount++;
}

function selectPanel(panel){
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('selected'));
    panel.classList.add('selected');
    selectedPanel=panel;
    document.getElementById('selected-panel').innerText=panel.id;
}

document.addEventListener('click', e=>{
    const toolbar = document.getElementById('toolbar');
    if(!e.target.classList.contains('panel') && !toolbar.contains(e.target)){
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('selected'));
        selectedPanel = null;
        document.getElementById('selected-panel').innerText = 'None';
    }
});

// SPEECH BUBBLES
function addSpeech(){
    if(!selectedPanel) return alert("Select a panel first!");
    const wrapper=document.createElement('div');
    wrapper.className='speech-wrapper';
    wrapper.style.left='10px';
    wrapper.style.top='10px';
    wrapper.style.width='auto';
    wrapper.style.height='auto';
    wrapper.style.transform='rotate(0deg)';

    const bubble=document.createElement('div');
    bubble.className='speech';
    bubble.contentEditable=true;
    bubble.innerText='Type here...';
    wrapper.appendChild(bubble);

    selectedPanel.querySelector('.panel-content').appendChild(wrapper);
    makeDraggableResizable(wrapper, selectedPanel.querySelector('.panel-content'));
}

// IMAGE UPLOAD
document.getElementById('uploadImage').addEventListener('change', e=>{
    if(!selectedPanel) return alert("Select a panel first!");
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=function(ev){
        const wrapper=document.createElement('div');
        wrapper.className='image-wrapper';
        wrapper.style.left='10px';
        wrapper.style.top='10px';
        wrapper.style.width='80px';
        wrapper.style.height='80px';
        wrapper.style.transform='rotate(0deg)';

        const img=document.createElement('img');
        img.src=ev.target.result;
        img.className='comic-image';
        img.style.width='100%';
        img.style.height='100%';
        wrapper.appendChild(img);

        selectedPanel.querySelector('.panel-content').appendChild(wrapper);
        makeDraggableResizable(wrapper, selectedPanel.querySelector('.panel-content'));
        selectedPanel.classList.add('selected');
        document.getElementById('selected-panel').innerText = selectedPanel.id;
        e.target.value="";
    };
    reader.readAsDataURL(file);
});

// BACKGROUND UPLOAD
document.getElementById('uploadBg').addEventListener('change', e=>{
    if(!selectedPanel) return alert("Select a panel first!");
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=function(ev){
        selectedPanel.querySelector('.panel-bg').style.backgroundImage=`url(${ev.target.result})`;
        selectedPanel.classList.add('selected');
        document.getElementById('selected-panel').innerText = selectedPanel.id;
        e.target.value="";
    };
    reader.readAsDataURL(file);
});

// DRAG, RESIZE, ROTATE
function makeDraggableResizable(el, container){
    el.addEventListener('mouseenter',()=>{ el.classList.add('hovered'); });
    el.addEventListener('mouseleave',()=>{ el.classList.remove('hovered'); });

    // DRAG
    let offsetX, offsetY, startX, startY;
    el.onmousedown=function(e){
        if(e.target.classList.contains('resizer') || e.target.classList.contains('rotator')) return;
        e.preventDefault();
        startX=e.clientX; startY=e.clientY;
        offsetX=parseFloat(el.style.left)||0; offsetY=parseFloat(el.style.top)||0;
        function move(e){
            let dx=e.clientX-startX, dy=e.clientY-startY;
            el.style.left=(offsetX+dx)+'px';
            el.style.top=(offsetY+dy)+'px';
        }
        function stop(){document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',stop);}
        document.addEventListener('mousemove',move);
        document.addEventListener('mouseup',stop);
    };
    el.ondragstart=()=>false;

    // RESIZE
    const corners=['tl','tr','bl','br'];
    corners.forEach(corner=>{
        const resizer=document.createElement('div');
        resizer.className='resizer '+corner;
        el.appendChild(resizer);
        resizer.addEventListener('mousedown', e=>{
            e.stopPropagation(); e.preventDefault();
            const startW=el.offsetWidth, startH=el.offsetHeight, startX=parseFloat(el.style.left)||0, startY=parseFloat(el.style.top)||0;
            const sX=e.clientX, sY=e.clientY;
            function resize(ev){
                let dx=ev.clientX-sX, dy=ev.clientY-sY;
                let newW=startW, newH=startH, newL=startX, newT=startY;
                if(corner==='br'){ newW=startW+dx; newH=startH+dy; }
                if(corner==='bl'){ newW=startW-dx; newH=startH+dy; newL=startX+dx; }
                if(corner==='tr'){ newW=startW+dx; newH=startH-dy; newT=startY+dy; }
                if(corner==='tl'){ newW=startW-dx; newH=startH-dy; newL=startX+dx; newT=startY+dy; }
                el.style.width = Math.max(newW,20)+'px';
                el.style.height = Math.max(newH,20)+'px';
                el.style.left = newL+'px';
                el.style.top = newT+'px';
            }
            function stopResize(){document.removeEventListener('mousemove',resize); document.removeEventListener('mouseup',stopResize);}
            document.addEventListener('mousemove',resize); document.addEventListener('mouseup',stopResize);
        });
    });

    // ROTATE
    const rotator=document.createElement('div'); rotator.className='rotator';
    el.appendChild(rotator);
    rotator.addEventListener('mousedown', e=>{
        e.stopPropagation(); e.preventDefault();
        const rect=el.getBoundingClientRect(), cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
        function rotate(ev){ 
            const angle=Math.atan2(ev.clientY-cy, ev.clientX-cx)*180/Math.PI; 
            el.style.transform='rotate('+angle+'deg)'; 
        }
        function stopRotate(){document.removeEventListener('mousemove',rotate); document.removeEventListener('mouseup',stopRotate);}
        document.addEventListener('mousemove',rotate); document.addEventListener('mouseup',stopRotate);
    });
}

// CLEAR & DOWNLOAD
function clearPanels(){document.getElementById('comic-container').innerHTML=''; panelCount=0; selectedPanel=null; document.getElementById('selected-panel').innerText='None';}

function downloadPanels(){
    const panels=document.querySelectorAll('.panel');
    panels.forEach((panel,i)=>{
        html2canvas(panel).then(canvas=>{
            const link=document.createElement('a');
            link.download='panel-'+i+'.png';
            link.href=canvas.toDataURL();
            link.click();
        });
    });
}

// TTS
function unlockTTS(){
    const utter = new SpeechSynthesisUtterance("TTS unlocked");
    speechSynthesis.speak(utter);
    ttsUnlocked = true;
    alert("TTS unlocked!");
}

async function playComicTTS(){
    if(!ttsUnlocked){ alert("Click 'Unlock TTS' first!"); return; }
    const panels = Array.from(document.querySelectorAll('.panel'));
    if(panels.length===0) return;

    panels.forEach(p=>p.style.display='none');
    await waitVoices();

    for(let p of panels){
        p.style.display='block';
        const bubbles = Array.from(p.querySelectorAll('.speech'));
        bubbles.forEach(b=>b.style.visibility='hidden');

        for(let b of bubbles){
            b.style.visibility='visible';
            b.classList.add('hovered');
            await speakText(b.innerText);
            b.classList.remove('hovered');
        }
        await new Promise(r=>setTimeout(r,300));
    }
    panels.forEach(p=>p.style.display='block');
}

function waitVoices(){ 
    return new Promise(resolve=>{
        let voices = speechSynthesis.getVoices();
        if(voices.length>0) return resolve();
        speechSynthesis.onvoiceschanged = ()=>resolve();
    });
}

function speakText(text){
    return new Promise(resolve=>{
        const utter = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        if(voices.length>0) utter.voice = voices[0];
        utter.onend = resolve;
        speechSynthesis.speak(utter);
    });
}
</script>
</body>
</html>
