<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaron Wei | Advanced Mini Comic Maker</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f4f8; margin:0; padding:0; text-align:center; }
header { background:#4CAF50; color:white; padding:15px; }
nav a { color:white; margin:0 10px; text-decoration:none; font-weight:bold; cursor:pointer; }
nav a:hover { text-decoration:underline; }
main { padding:20px; }
section { display:none; }
section.active { display:block; }
footer { background:#222; color:white; padding:10px; }
#comic-container { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-top:20px; }
.panel { width:300px; height:300px; background:white; border:2px solid #333; position:relative; overflow:hidden; }
.speech, .comic-image { position:absolute; cursor:grab; }
.speech { background:yellow; padding:5px; border-radius:10px; max-width:280px; }
#toolbar { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:10px; }
#characters img { width:50px; height:50px; margin:3px; cursor:grab; border:2px solid transparent; }
#characters img:hover { border-color:#4CAF50; }
input[type=file] { margin-top:5px; }
.resizer { width:10px; height:10px; background:#4CAF50; position:absolute; right:0; bottom:0; cursor:se-resize; }
.rotator { width:10px; height:10px; background:#FF5722; position:absolute; right:0; top:0; cursor:grab; }
label { font-weight:bold; display:block; margin-top:10px; }
</style>
</head>
<body>

<header>
<h1>Aaron Wei | Advanced Mini Comic Maker</h1>
<nav><a onclick="showSection('comic')">Mini Comic Maker</a></nav>
</header>

<main>
<section id="comic" class="active">
<h2>Mini Comic Maker</h2>
<div id="toolbar">
<button onclick="addPanel()">Add Panel</button>
<button onclick="addSpeech()">Add Speech Bubble</button>
<button onclick="clearPanels()">Clear All</button>
<button onclick="downloadPanels()">Download All Panels</button>
</div>

<div style="margin-top:15px;">
<label for="uploadImage">Upload a Character / Panel Image:</label>
<input type="file" id="uploadImage" accept="image/*">
<label for="uploadBg">Upload a Panel Background:</label>
<input type="file" id="uploadBg" accept="image/*">
</div>

<div id="characters" style="margin-top:15px;">
<p><strong>Preloaded Characters:</strong></p>
<img src="https://via.placeholder.com/50x50/FF0000/FFFFFF?text=A" alt="Character A" draggable="true">
<img src="https://via.placeholder.com/50x50/00FF00/FFFFFF?text=B" alt="Character B" draggable="true">
<img src="https://via.placeholder.com/50x50/0000FF/FFFFFF?text=C" alt="Character C" draggable="true">
</div>

<div id="comic-container"></div>
</section>
</main>

<footer>
<p>© 2026 Aaron Wei | <a href="https://github.com/aaronwei2016" style="color:white;">GitHub</a></p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function showSection(id){
  document.querySelectorAll('section').forEach(sec => sec.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Comic Maker
let panelCount=0;

function addPanel(){
  const container=document.getElementById('comic-container');
  const panel=document.createElement('div');
  panel.className='panel';
  panel.id='panel-'+panelCount;
  panelCount++;
  container.appendChild(panel);
}

// Speech Bubble
function addSpeech(){
  const panels=document.getElementsByClassName('panel');
  if(!panels.length) return alert("Add a panel first!");
  const speech=document.createElement('div');
  speech.className='speech';
  speech.contentEditable=true;
  speech.innerText='Type here...';
  speech.style.left='10px'; speech.style.top='10px';
  panels[panels.length-1].appendChild(speech);
  makeDraggable(speech, panels[panels.length-1], false);
}

// Clear Panels
function clearPanels(){document.getElementById('comic-container').innerHTML=''; panelCount=0;}

// Dragging
function makeDraggable(el, container, allowRotation=true){
  let offsetX, offsetY, startX, startY;
  el.onmousedown=function(e){
    if(e.target.classList.contains('resizer') || e.target.classList.contains('rotator')) return;
    e.preventDefault();
    startX=e.clientX; startY=e.clientY;
    offsetX=parseFloat(el.style.left)||0;
    offsetY=parseFloat(el.style.top)||0;
    function move(e){
      let dx=e.clientX-startX;
      let dy=e.clientY-startY;
      let newX=Math.min(Math.max(offsetX+dx,0),container.clientWidth-el.offsetWidth);
      let newY=Math.min(Math.max(offsetY+dy,0),container.clientHeight-el.offsetHeight);
      el.style.left=newX+'px';
      el.style.top=newY+'px';
    }
    function stop(){document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',stop);}
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',stop);
  };
  el.ondragstart=()=>false;

  // Resizer and Rotator
  if(allowRotation){
    const resizer=document.createElement('div'); resizer.className='resizer';
    el.appendChild(resizer);
    resizer.addEventListener('mousedown', e=>{
      e.stopPropagation(); e.preventDefault();
      const startW=el.offsetWidth, startH=el.offsetHeight, sX=e.clientX, sY=e.clientY;
      function resize(ev){ el.style.width=Math.max(20,startW+ev.clientX-sX)+'px'; el.style.height=Math.max(20,startH+ev.clientY-sY)+'px'; }
      function stopResize(){document.removeEventListener('mousemove',resize); document.removeEventListener('mouseup',stopResize);}
      document.addEventListener('mousemove',resize); document.addEventListener('mouseup',stopResize);
    });

    const rotator=document.createElement('div'); rotator.className='rotator';
    el.appendChild(rotator);
    rotator.addEventListener('mousedown', e=>{
      e.stopPropagation(); e.preventDefault();
      const rect=el.getBoundingClientRect();
      const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
      function rotate(ev){
        const angle=Math.atan2(ev.clientY-cy, ev.clientX-cx)*180/Math.PI;
        el.style.transform='rotate('+angle+'deg)';
      }
      function stopRotate(){document.removeEventListener('mousemove',rotate); document.removeEventListener('mouseup',stopRotate);}
      document.addEventListener('mousemove',rotate); document.addEventListener('mouseup',stopRotate);
    });
  }
}

// Preloaded Characters Drag
document.querySelectorAll('#characters img').forEach(img=>{
  img.addEventListener('dragstart', e=> e.dataTransfer.setData('text/plain', e.target.src));
});

document.getElementById('comic-container').addEventListener('dragover', e=>e.preventDefault());
document.getElementById('comic-container').addEventListener('drop', e=>{
  e.preventDefault();
  const src=e.dataTransfer.getData('text/plain');
  const panel=e.target.closest('.panel'); if(!panel) return;
  const img=document.createElement('img'); img.src=src; img.className='comic-image';
  img.style.width='80px'; img.style.height='80px'; img.style.left=(e.offsetX-40)+'px'; img.style.top=(e.offsetY-40)+'px';
  panel.appendChild(img);
  makeDraggable(img, panel, true);
});

// Upload Character / Image
document.getElementById('uploadImage').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const panels=document.getElementsByClassName('panel'); if(!panels.length) return alert("Add a panel first!");
    const img=document.createElement('img'); img.src=ev.target.result; img.className='comic-image';
    img.style.width='80px'; img.style.height='80px'; img.style.left='10px'; img.style.top='10px';
    panels[panels.length-1].appendChild(img);
    makeDraggable(img, panels[panels.length-1], true);
  };
  reader.readAsDataURL(file);
});

// Upload Panel Background
document.getElementById('uploadBg').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const panels=document.getElementsByClassName('panel'); if(!panels.length) return alert("Add a panel first!");
    panels[panels.length-1].style.backgroundImage=`url(${ev.target.result})`;
    panels[panels.length-1].style.backgroundSize='cover';
  };
  reader.readAsDataURL(file);
});

// Download panels
function downloadPanels(){
  const panels=document.querySelectorAll('.panel');
  panels.forEach((panel,i)=>{
    html2canvas(panel).then(canvas=>{
      const link=document.createElement('a');
      link.download='panel-'+i+'.png';
      link.href=canvas.toDataURL();
      link.click();
    });
  });
}
</script>

</body>
</html>
